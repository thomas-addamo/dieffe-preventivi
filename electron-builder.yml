appId: it.impresadieffe.preventivi
productName: Dieffe Preventivi
copyright: Copyright © 2026 Dieffe Ristrutturazioni

# Directory output build
directories:
  output: dist-electron
  buildResources: assets

# File da includere nell'app.
# NB: l'app in produzione carica la web app remota (Vercel): il wrapper Electron ha
# bisogno solo di electron-dist + i runtime deps (electron-updater, electron-store).
# node_modules è mantenuto perché electron-builder ci recupera i runtime deps di
# produzione (i devDependencies vengono comunque esclusi automaticamente).
files:
  - electron-dist/**/*
  - node_modules/**/*
  - package.json
  - "!node_modules/.cache/**/*"
  - "!**/*.{ts,tsx,map}"

# NB: l'entry point Electron NON va qui — electron-builder lo legge dal campo
# "main" di package.json (impostato a electron-dist/main.js).

# macOS
mac:
  category: public.app-category.business
  icon: assets/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  target:
    - target: dmg
      arch: [x64, arm64] # Intel + Apple Silicon
    - target: zip
      arch: [x64, arm64]

dmg:
  title: Dieffe Preventivi
  icon: assets/icon.icns
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows
win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch: [x64]
    - target: msi
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Dieffe Preventivi
  license: assets/license.txt

# Auto-updater — punta a GitHub Releases.
# NB: nessun "token" qui — electron-builder usa automaticamente la variabile
# d'ambiente GH_TOKEN (impostata dalla GitHub Action) solo quando pubblica.
publish:
  provider: github
  owner: thomas-addamo
  repo: dieffe-preventivi
  private: true
